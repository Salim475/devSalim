    <script>
        // Load exactly 6 work boxes (work1..work6). Try common extensions; fallback to logo.
        (function(){
            const gallery = document.getElementById('gallery');
            const exts = ['jpg','jpeg','png','avif','webp'];
            const target = 6;
            let added = 0;

            function addCard(src){
                if(added >= target) return;
                const col = document.createElement('div'); col.className = 'col-lg-4 col-md-6 col-sm-6';
                const single = document.createElement('div'); single.className = 'single-work text-center mt-30';
                const imgWrap = document.createElement('div'); imgWrap.className = 'work-image';
                const img = document.createElement('img'); img.src = src; img.alt = 'work';
                imgWrap.appendChild(img);
                const overlay = document.createElement('div'); overlay.className = 'work-overlay';
                const content = document.createElement('div'); content.className = 'work-content';
                const h3 = document.createElement('h3'); h3.className = 'work-title'; h3.textContent = '';
                const ul = document.createElement('ul');
                const li = document.createElement('li');
                const a = document.createElement('a'); a.className = 'image-popup'; a.href = src; a.innerHTML = '<i class="lni-plus"></i>';
                li.appendChild(a); ul.appendChild(li);
                content.appendChild(h3); content.appendChild(ul);
                overlay.appendChild(content);
                single.appendChild(imgWrap); single.appendChild(overlay);
                col.appendChild(single);
                gallery.appendChild(col);
                added++;
            }

            // For each slot 1..6 try extensions; if none found, use logo as placeholder
            for(let i=1;i<=target;i++){
                (function(index){
                    let found = false;
                    for(const ext of exts){
                        const src = `assets/images/work/work${index}.${ext}`;
                        const img = new Image();
                        img.onload = function(){ if(!found && added < target){ found = true; addCard(src); $('.image-popup').magnificPopup({ type: 'image', gallery: { enabled: true } }); } };
                        img.onerror = function(){};
                        img.src = src;
                    }
                    // fallback after short delay if none of the extensions loaded
                    setTimeout(function(){ if(!found && added < target){ addCard('assets/images/logo.png'); $('.image-popup').magnificPopup({ type: 'image', gallery: { enabled: true } }); } }, 300);
                })(i);
            }
        })();
    </script>
